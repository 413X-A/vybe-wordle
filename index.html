<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>VYBE</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- CSS COMPONENT SYSTEM -->
  <link rel="stylesheet" href="./css/components/base.css">
  <link rel="stylesheet" href="./css/components/login.css">

  <link rel="icon" href="./assets/icons/icon.ico">
</head>

<body>

<div class="game-frame">

  <div id="top-ui-bar"></div>

  <img src="assets/icons/wordle_main.png" class="wordle">

  <div class="login-box">

    <input type="text" id="username" placeholder="Benutzername">
    <input type="email" id="email" placeholder="E-Mail">
    <input type="password" id="password" placeholder="Passwort">

    <button id="loginBtn">LOS GEHT'S!</button>

  </div>

  <p id="status">Willkommen bei vybe-wordle!</p>

</div>

<script type="module" src="./javascript/index_ui.js"></script>
<script type="module" src="./javascript/login.js"></script>

</body>
</html>
